$kind: http-request
description: >
  Доступно только роли user. Возвращает брони пользователя, чей `user_id`
  содержится в JWT-токене. Возвращаются только брони на будущие слоты (start >=
  now); брони на уже прошедшие слоты в ответ не включаются.
url: "{{baseUrl}}/bookings/my"
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Список броней текущего пользователя (только
  user).resources/examples
order: 1000
