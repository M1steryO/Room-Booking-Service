$kind: http-example
request:
  url: "{{baseUrl}}/bookings/my"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: text
    content: ""
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "INTERNAL_ERROR",
          "message": "internal server error"
        }
      }
order: 4000
