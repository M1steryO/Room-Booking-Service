$kind: http-example
request:
  url: "{{baseUrl}}/bookings/create"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "slotId": "454b7a0f-02c8-46e1-f963-a5e90573f548",
        "createConferenceLink": false
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "SLOT_ALREADY_BOOKED",
          "message": "slot is already booked"
        }
      }
order: 6000
