$kind: http-request
description: >
  Доступно только роли user. Администратор не может создавать брони (403).
  `userId` берётся из JWT-токена, а не из тела запроса. Если временной слот
  находится в прошлом (start < now), возвращается 400 (INVALID_REQUEST).
url: "{{baseUrl}}/bookings/create"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "slotId": "454b7a0f-02c8-46e1-f963-a5e90573f548",
      "createConferenceLink": false
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Создать бронь на слот (только user). Опционально —
  запросить ссылку на конференцию..resources/examples
order: 1000
