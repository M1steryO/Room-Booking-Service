$kind: http-example
request:
  url: "{{baseUrl}}/bookings/:bookingId/cancel"
  method: POST
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: bookingId
      value: 98010285-1d32-8c04-4966-5846d11b6cdb
      description: Идентификатор брони
  body:
    type: text
    content: ""
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "FORBIDDEN",
          "message": "cannot cancel another user's booking"
        }
      }
order: 3000
