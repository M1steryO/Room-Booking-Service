$kind: http-request
description: >
  Выдаёт тестовый JWT для указанной роли (admin / user). Для каждой роли
  возвращается **фиксированный UUID** пользователя: один и тот же UUID для всех
  запросов с ролью admin и один и тот же UUID для роли user. Это обеспечивает
  стабильность при тестировании сценариев, требующих проверки владельца брони.
  JWT должен содержать как минимум `user_id` (UUID) и `role`. Этот эндпоинт
  является **обязательным** и должен быть реализован в любом случае, независимо
  от реализации `/register` и `/login`. Принимает только допустимые значения
  роли: `admin` или `user`; иные значения — 400.
url: "{{baseUrl}}/dummyLogin"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "role": "user"
    }
examples: ./.resources/Получить тестовый JWT по роли (ОБЯЗАТЕЛЬНО). Доступен без
  авторизации..resources/examples
order: 1000
