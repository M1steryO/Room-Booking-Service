$kind: http-example
request:
  url: "{{baseUrl}}/dummyLogin"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "role": "user"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "INVALID_REQUEST",
          "message": "invalid request"
        }
      }
order: 2000
