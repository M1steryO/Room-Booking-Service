$kind: http-example
request:
  url: "{{baseUrl}}/dummyLogin"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "role": "user"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "INTERNAL_ERROR",
          "message": "internal server error"
        }
      }
order: 3000
