$kind: http-example
request:
  url: "{{baseUrl}}/login"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "email": "CUH85iMVJmkT5D@rHUH.cwr",
        "password": "string"
      }
