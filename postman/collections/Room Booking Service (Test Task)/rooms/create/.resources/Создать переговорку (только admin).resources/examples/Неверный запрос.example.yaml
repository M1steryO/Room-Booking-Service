$kind: http-example
request:
  url: "{{baseUrl}}/rooms/create"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "name": "string",
        "description": "string",
        "capacity": 4630
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "INVALID_REQUEST",
          "message": "invalid request"
        }
      }
order: 2000
