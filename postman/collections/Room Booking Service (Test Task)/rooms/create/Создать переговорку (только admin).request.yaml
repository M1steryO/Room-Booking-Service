$kind: http-request
url: "{{baseUrl}}/rooms/create"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "string",
      "description": "string",
      "capacity": 4630
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Создать переговорку (только admin).resources/examples
order: 1000
