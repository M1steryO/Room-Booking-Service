$kind: http-example
request:
  url: "{{baseUrl}}/rooms/:roomId/slots/list?date=1993-11-29"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: date
      value: 1993-11-29
      description: "Дата в формате ISO 8601 (например: 2024-06-10). Обязательный
        параметр; при отсутствии — 400."
  pathVariables:
    - key: roomId
      value: 98010285-1d32-8c04-4966-5846d11b6cdb
      description: Идентификатор переговорки
  body:
    type: text
    content: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "INVALID_REQUEST",
          "message": "invalid request"
        }
      }
order: 2000
