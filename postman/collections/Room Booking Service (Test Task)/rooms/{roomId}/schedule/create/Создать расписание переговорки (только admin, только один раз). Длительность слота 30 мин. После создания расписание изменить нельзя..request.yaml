$kind: http-request
description: >
  Доступно только роли admin. Расписание можно создать только один раз для
  каждой переговорки. Поле `daysOfWeek` должно содержать значения от 1 до 7
  (1=Пн, 7=Вс). При передаче значений вне этого диапазона возвращается 400.
url: "{{baseUrl}}/rooms/:roomId/schedule/create"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: roomId
    value: 98010285-1d32-8c04-4966-5846d11b6cdb
    description: Идентификатор переговорки
body:
  type: json
  content: |-
    {
      "roomId": "17489c33-a7b5-cf87-4a4e-e327ef0388ab",
      "daysOfWeek": [
        2,
        4
      ],
      "startTime": "20:12",
      "endTime": "10:26",
      "id": "ab25033d-4acb-03f3-08f3-f694ec83f7ae"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Создать расписание переговорки (только admin, только один
  раз). Длительность слота 30 мин. После создания расписание изменить
  нельзя..resources/examples
order: 1000
