$kind: http-example
request:
  url: "{{baseUrl}}/rooms/:roomId/schedule/create"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: roomId
      value: 98010285-1d32-8c04-4966-5846d11b6cdb
      description: Идентификатор переговорки
  body:
    type: json
    content: |-
      {
        "roomId": "17489c33-a7b5-cf87-4a4e-e327ef0388ab",
        "daysOfWeek": [
          2,
          4
        ],
        "startTime": "20:12",
        "endTime": "10:26",
        "id": "ab25033d-4acb-03f3-08f3-f694ec83f7ae"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "INVALID_REQUEST",
          "message": "invalid request"
        }
      }
order: 2000
