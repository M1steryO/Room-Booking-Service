$kind: http-example
request:
  url: "{{baseUrl}}/rooms/:roomId/schedule/create"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: roomId
      value: 98010285-1d32-8c04-4966-5846d11b6cdb
      description: Идентификатор переговорки
  body:
    type: json
    content: |-
      {
        "roomId": "17489c33-a7b5-cf87-4a4e-e327ef0388ab",
        "daysOfWeek": [
          2,
          4
        ],
        "startTime": "20:12",
        "endTime": "10:26",
        "id": "ab25033d-4acb-03f3-08f3-f694ec83f7ae"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "schedule": {
          "roomId": "92a9d248-c503-77c5-9ceb-ec788d7285d6",
          "daysOfWeek": [
            6,
            3
          ],
          "startTime": "12:54",
          "endTime": "23:30",
          "id": "871a2d11-54a0-7a8f-8cec-8eedbec2d0e9"
        }
      }
order: 1000
