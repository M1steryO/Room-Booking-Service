version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: room-booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d room-booking" ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      # "./migrations/init.sql" - путь к миграциям БД
      - ./migrations/0001_init.up.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      internal:

  app:
    build: .
    container_name: avito-booking-service
    ports:
      - "8080:8080"
    environment:
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE_NAME=room-booking
      - ENV=local
      - JWT_SECRET=change-me
      - JWT_TTL=24h
      - SLOT_HORIZON_DAYS=14
      - CONFERENCE_BASE_URL=https://conference.mock.local
      - CONFERENCE_TIMEOUT=2s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

networks:
  internal: